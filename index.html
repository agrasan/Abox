<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Hidden tags to help Google find the Abox Portal -->
    <meta name="description" content="Play the ultimate Abox web games portal by Agrasan. High energy browser games.">
    <meta name="keywords" content="Abox, Abox Portal, Abox Game, Agrasan, Agrasan Games, HTML Games">
    <meta name="author" content="Agrasan">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Abox Portal | Spaceship Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Game Canvas Container */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* Mobile Controls Overlay */
        .mobile-control {
            position: absolute;
            bottom: 40px;
            z-index: 10;
        }

        /* Left side Virtual Joystick Container */
        #joystick-zone {
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        /* Inside stick piece */
        #joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.05s linear;
            pointer-events: none;
        }

        /* Right side Bomb Action Button */
        #bomb-button {
            right: 40px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff4757 0%, #ff2e44 100%);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(255, 71, 87, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: none;
        }

        #bomb-button:active {
            transform: scale(0.9);
            background: #ff2e44;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <!-- Mobile Touch Controls -->
    <div id="joystick-zone" class="mobile-control">
        <div id="joystick-stick"></div>
    </div>
    
    <div id="bomb-button" class="mobile-control">💥 Bomb</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // Handle full screen sizing dynamically
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let score = 0;

    // Player Spaceship Setup
    const player = {
        x: canvas.width / 2,
        y: canvas.height * 0.7,
        size: 30,
        speed: 6,
        vx: 0,
        vy: 0
    };

    // Arrays for Game Entities
    const obstacles = [];
    const particles = [];

    // Spawn Obstacles (Asteroids)
    function spawnObstacle() {
        if (obstacles.length < 10) {
            obstacles.push({
                x: Math.random() * canvas.width,
                y: -20,
                size: Math.random() * 20 + 15,
                speed: Math.random() * 2 + 2
            });
        }
    }
    setInterval(spawnObstacle, 1000);

    // Create Exploding Particle Effects
    function createExplosion(x, y, color) {
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                radius: Math.random() * 3 + 1,
                alpha: 1,
                color: color
            });
        }
    }

    // Trigger Screen-Clearing Bomb
    function triggerBomb() {
        if (obstacles.length === 0) return;
        
        // Blow up every visible target
        for (let i = obstacles.length - 1; i >= 0; i--) {
            createExplosion(obstacles[i].x, obstacles[i].y, '#ff4757');
            obstacles.splice(i, 1);
            score += 10;
        }
        scoreEl.innerText = score;
    }

    // --- MOBILE JOYSTICK TOUCH INTERACTION LOGIC ---
    const joystickZone = document.getElementById('joystick-zone');
    const joystickStick = document.getElementById('joystick-stick');
    
    let joystickActive = false;
    let joystickStartX = 0;
    let joystickStartY = 0;
    const maxDrag = 40; // Max movement radius for stick visual inside ring

    joystickZone.addEventListener('touchstart', (e) => {
        joystickActive = true;
        const touch = e.touches[0];
        const rect = joystickZone.getBoundingClientRect();
        // Set center point of joystick zone as pivot anchor
        joystickStartX = rect.left + rect.width / 2;
        joystickStartY = rect.top + rect.height / 2;
        handleJoystickMove(touch);
    });

    window.addEventListener('touchmove', (e) => {
        if (!joystickActive) return;
        // Search through all touches to update correct finger location
        for (let i = 0; i < e.touches.length; i++) {
            if (e.touches[i].target === joystickZone || joystickActive) {
                handleJoystickMove(e.touches[i]);
                break;
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', () => {
        joystickActive = false;
        player.vx = 0;
        player.vy = 0;
        joystickStick.style.transform = `translate(0px, 0px)`;
    });

    function handleJoystickMove(touch) {
        const dx = touch.clientX - joystickStartX;
        const dy = touch.clientY - joystickStartY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        let angle = Math.atan2(dy, dx);
        
        // Bound the joystick physical visualization constraints
        let moveX = dx;
        let moveY = dy;
        if (distance > maxDrag) {
            moveX = Math.cos(angle) * maxDrag;
            moveY = Math.sin(angle) * maxDrag;
        }
        
        joystickStick.style.transform = `translate(${moveX}px, ${moveY}px)`;

        // Translate the calculation directly into player steering physics vectors
        const intensity = Math.min(distance / maxDrag, 1);
        player.vx = Math.cos(angle) * player.speed * intensity;
        player.vy = Math.sin(angle) * player.speed * intensity;
    }

    // Attach Action Listener to Bomb UI Elements
    document.getElementById('bomb-button').addEventListener('touchstart', (e) => {
        e.preventDefault();
        triggerBomb();
    });

    // Keyboard support fallback for PC diagnostics
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a') player.vx = -player.speed;
        if (e.key === 'ArrowRight' || e.key === 'd') player.vx = player.speed;
        if (e.key === 'ArrowUp' || e.key === 'w') player.vy = -player.speed;
        if (e.key === 'ArrowDown' || e.key === 's') player.vy = player.speed;
        if (e.key === ' ' || e.key === 'b') triggerBomb();
    });

    window.addEventListener('keyup', (e) => {
        if (['ArrowLeft', 'ArrowRight', 'a', 'd'].includes(e.key)) player.vx = 0;
        if (['ArrowUp', 'ArrowDown', 'w', 's'].includes(e.key)) player.vy = 0;
    });

    // --- PRINCIPAL RENDER LOOP ---
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movement Physics and Boundary Enforcements
        player.x += player.vx;
        player.y += player.vy;

        if (player.x < player.size) player.x = player.size;
        if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
        if (player.y < player.size) player.y = player.size;
        if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

        // Render Spaceship (Triangle structure)
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.size);
        ctx.lineTo(player.x - player.size, player.y + player.size);
        ctx.lineTo(player.x + player.size, player.y + player.size);
        ctx.closePath();
        ctx.fillStyle = '#00d2d3';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.stroke();

        // Update & Render Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.y += obs.speed;

            ctx.beginPath();
            ctx.arc(obs.x, obs.y, obs.size, 0, Math.PI * 2);
            ctx.fillStyle = '#57606f';
            ctx.fill();

            // Check if off-screen
            if (obs.y > canvas.height + 40) {
                obstacles.splice(i, 1);
                continue;
            }

            // Simple Collision Check
            let dist = Math.sqrt((player.x - obs.x)**2 + (player.y - obs.y)**2);
            if (dist < player.size + obs.size) {
                createExplosion(player.x, player.y, '#00d2d3');
                score = 0;
                scoreEl.innerText = score;
                obstacles.splice(i, 1);
            }
        }

        // Update & Render Particle system
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.02;

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.restore();

            if (p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }

        requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
</script>
</body>
</html>
