<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Play the ultimate Abox web games portal by Agrasan. High energy browser games.">
    <meta name="keywords" content="Abox, Abox Portal, Abox Game, Agrasan, Agrasan Games, HTML Games">
    <meta name="author" content="Agrasan">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abox Portal | Handcrafted HTML5 Experiences</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- DASHBOARD PORTAL PORT LAYOUT --- */
        #portal-hub {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portal-logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .portal-badge {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d2d3, #00a8ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: #0d0d11;
            box-shadow: 0 0 20px rgba(0, 210, 211, 0.4);
            margin-bottom: 15px;
        }

        h1.portal-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #ffffff;
        }

        h1.portal-title span {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .portal-subtitle {
            color: #57606f;
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .games-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
        }

        .game-card {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .game-card.active:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.03);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.05);
        }

        .game-card#card-dodger.active { border-color: rgba(0, 255, 204, 0.2); }
        .game-card#card-snake.active { border-color: rgba(255, 0, 128, 0.2); }

        .game-card#card-snake.active:hover {
            border-color: #ff0080;
            background: rgba(255, 0, 128, 0.03);
            box-shadow: 0 10px 20px rgba(255, 0, 128, 0.05);
        }

        .game-card.disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }

        .game-icon {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .game-label {
            font-size: 13px;
            font-weight: 600;
            color: #a4b0be;
            letter-spacing: 0.5px;
        }

        /* --- THE IN-GAME VIEWPORT WRAPPER SYSTEM --- */
        #game-runtime-container {
            display: none;
            width: 100%;
            max-width: 500px; /* Expanded space boundary for larger view layouts */
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }

        .game-navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-btn {
            background-color: #1e272e;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover { background-color: #2f3640; }
        .nav-btn.close-btn { background-color: #ff4757; border: none; }
        .nav-btn.close-btn:hover { background-color: #ff6b81; }

        .nav-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1.5px;
        }

        #canvas-frame-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.25; /* Adjusted sizing aspect footprint */
            background-color: #05050a;
            border-radius: 6px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .telemetry-dashboard {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            margin-top: 10px;
        }

        .score-box {
            display: flex;
            gap: 15px;
        }
        .score-box span { color: #00ffcc; }

        /* --- GAME OVER INTERACTIVE OVERLAY SCREEN --- */
        #gameover-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 10, 0.85);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        #gameover-overlay h2 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ff4757;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }

        .overlay-actions {
            display: flex;
            gap: 15px;
        }

        .action-btn {
            padding: 12px 24px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }

        #btn-restart { background-color: #2ed573; color: #fff; }
        #btn-quit { background-color: #747d8c; color: #fff; }
    </style>
</head>
<body>

    <div id="portal-hub">
        <div class="portal-logo-container">
            <div class="portal-badge">A</div>
            <h1 class="portal-title">A<span>BOX</span></h1>
            <div class="portal-subtitle">Handcrafted Classic Custom HTML5 Experiences</div>
        </div>

        <div class="games-grid">
            <div class="game-card active" id="card-dodger" onclick="launchGame('dodger')">
                <div class="game-icon">🚀</div>
                <div class="game-label">Asteroid Dodger</div>
            </div>

            <div class="game-card active" id="card-snake" onclick="launchGame('snake')">
                <div class="game-icon">🐍</div>
                <div class="game-label">Cyber Snake</div>
            </div>

            <div class="game-card disabled">
                <div class="game-icon">🤖</div>
                <div class="game-label">Coming Soon</div>
            </div>
        </div>
    </div>

    <div id="game-runtime-container">
        <div class="game-navbar">
            <button class="nav-btn" onclick="toggleFullscreen()">Fullscreen</button>
            <div class="nav-title" id="navbar-header-text">GAME_TITLE</div>
            <button class="nav-btn close-btn" onclick="exitToHub()">Close</button>
        </div>

        <div id="canvas-frame-box">
            <div id="gameover-overlay">
                <h2>GAME OVER</h2>
                <div class="overlay-actions">
                    <button id="btn-restart" class="action-btn" onclick="restartCurrentGame()">Restart</button>
                    <button id="btn-quit" class="action-btn" onclick="exitToHub()">Quit</button>
                </div>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="telemetry-dashboard">
            <div class="score-box">
                <div>Score: <span id="telemetry-score">0</span></div>
                <div>High Score: <span id="telemetry-highscore">0</span></div>
            </div>
            <div id="telemetry-auxiliary">Status: Active</div>
        </div>
    </div>

<script>
    const hubElement = document.getElementById('portal-hub');
    const runtimeContainer = document.getElementById('game-runtime-container');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI elements tracking hooks
    const titleText = document.getElementById('navbar-header-text');
    const scoreText = document.getElementById('telemetry-score');
    const highscoreText = document.getElementById('telemetry-highscore');
    const auxText = document.getElementById('telemetry-auxiliary');
    const borderBox = document.getElementById('canvas-frame-box');
    const gameOverOverlay = document.getElementById('gameover-overlay');

    let currentActiveGame = null;
    let animationFrameId = null;
    let loopSpeedIntervalId = null;

    // Local Storage Space Profiles tracking parameters 
    let highScores = {
        dodger: 0,
        snake: 0
    };

    function syncCanvasSizing() {
        const rect = borderBox.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', () => { if (currentActiveGame) syncCanvasSizing(); });

    function launchGame(gameKey) {
        hubElement.style.display = 'none';
        runtimeContainer.style.display = 'flex';
        gameOverOverlay.style.display = 'none';
        syncCanvasSizing();
        
        currentActiveGame = gameKey;
        resetInputStates();

        // Print historical high scores readout data parameters
        highscoreText.innerText = highScores[gameKey];

        if (gameKey === 'dodger') {
            titleText.innerText = "ASTEROID DODGER";
            titleText.style.color = "#00ffcc";
            borderBox.style.border = "2px solid #00ffcc";
            auxText.style.color = "#ffcc00";
            initDodgerEngine();
        } else if (gameKey === 'snake') {
            titleText.innerText = "CYBER SNAKE";
            titleText.style.color = "#ff0080";
            borderBox.style.border = "2px solid #ff0080";
            auxText.style.color = "#00a8ff";
            initSnakeEngine();
        }
    }

    function triggerGameOver() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (loopSpeedIntervalId) clearInterval(loopSpeedIntervalId);
        gameOverOverlay.style.display = 'flex';
    }

    function restartCurrentGame() {
        gameOverOverlay.style.display = 'none';
        resetInputStates();
        if (currentActiveGame === 'dodger') initDodgerEngine();
        if (currentActiveGame === 'snake') initSnakeEngine();
    }

    function exitToHub() {
        currentActiveGame = null;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (loopSpeedIntervalId) clearInterval(loopSpeedIntervalId);
        
        gameOverOverlay.style.display = 'none';
        runtimeContainer.style.display = 'none';
        hubElement.style.display = 'flex';
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            borderBox.requestFullscreen().catch(err => alert("Fullscreen error: " + err.message));
        } else {
            document.exitFullscreen();
        }
    }

    // Input Engine Event Tracking Parsers
    let keys = {};
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
    
    function resetInputStates() { keys = {}; }


    /* ========================================================================
       ENGINE MODEL #1: ASTEROID DODGER
       ======================================================================== */
    let dodgerPlayer, dodgerAsteroids, dodgerStars, dodgerScore, dodgerBombs;

    function initDodgerEngine() {
        dodgerScore = 0;
        dodgerBombs = 1;
        scoreText.innerText = dodgerScore;
        highscoreText.innerText = highScores.dodger;
        auxText.innerText = "Bombs: " + dodgerBombs + " (Space)";

        dodgerPlayer = {
            x: canvas.width / 2,
            y: canvas.height * 0.8,
            radius: 12,
            speed: 5
        };

        dodgerAsteroids = [];
        dodgerStars = [];
        for (let i = 0; i < 40; i++) {
            dodgerStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        if (loopSpeedIntervalId) clearInterval(loopSpeedIntervalId);
        loopSpeedIntervalId = setInterval(() => {
            if (currentActiveGame !== 'dodger') return;
            if (dodgerAsteroids.length < 8) {
                dodgerAsteroids.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    radius: Math.random() * 15 + 8,
                    speed: Math.random() * 2 + 1.5
                });
            }
        }, 900);

        runDodgerLoop();
    }

    function runDodgerLoop() {
        if (currentActiveGame !== 'dodger') return;

        if (keys['a'] || keys['arrowleft']) dodgerPlayer.x -= dodgerPlayer.speed;
        if (keys['d'] || keys['arrowright']) dodgerPlayer.x += dodgerPlayer.speed;
        if (keys['w'] || keys['arrowup']) dodgerPlayer.y -= dodgerPlayer.speed;
        if (keys['s'] || keys['arrowdown']) dodgerPlayer.y += dodgerPlayer.speed;

        if (keys[' '] && dodgerBombs > 0) {
            dodgerBombs--;
            dodgerAsteroids = [];
            dodgerScore += 10;
            scoreText.innerText = dodgerScore;
            
            if(dodgerScore > highScores.dodger) {
                highScores.dodger = dodgerScore;
                highscoreText.innerText = highScores.dodger;
            }
            auxText.innerText = "Bombs: " + dodgerBombs + " (Space)";
            keys[' '] = false;
        }

        // Keep inside window area
        if (dodgerPlayer.x < dodgerPlayer.radius) dodgerPlayer.x = dodgerPlayer.radius;
        if (dodgerPlayer.x > canvas.width - dodgerPlayer.radius) dodgerPlayer.x = canvas.width - dodgerPlayer.radius;
        if (dodgerPlayer.y < dodgerPlayer.radius) dodgerPlayer.y = dodgerPlayer.radius;
        if (dodgerPlayer.y > canvas.height - dodgerPlayer.radius) dodgerPlayer.y = canvas.height - dodgerPlayer.radius;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(255,255,255,0.4)";
        dodgerStars.forEach(star => {
            star.y += star.speed;
            if (star.y > canvas.height) star.y = 0;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(dodgerPlayer.x, dodgerPlayer.y - dodgerPlayer.radius * 1.3);
        ctx.lineTo(dodgerPlayer.x - dodgerPlayer.radius * 1.1, dodgerPlayer.y + dodgerPlayer.radius);
        ctx.lineTo(dodgerPlayer.x + dodgerPlayer.radius * 1.1, dodgerPlayer.y + dodgerPlayer.radius);
        ctx.closePath();
        ctx.fillStyle = '#00ffcc';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ffcc';
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = '#e61e4f';
        for (let i = dodgerAsteroids.length - 1; i >= 0; i--) {
            let a = dodgerAsteroids[i];
            a.y += a.speed;

            ctx.beginPath();
            ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
            ctx.fill();

            if (a.y > canvas.height + 20) {
                dodgerAsteroids.splice(i, 1);
                dodgerScore++;
                scoreText.innerText = dodgerScore;

                if(dodgerScore > highScores.dodger) {
                    highScores.dodger = dodgerScore;
                    highscoreText.innerText = highScores.dodger;
                }
                if (dodgerScore % 25 === 0) {
                    dodgerBombs++;
                    auxText.innerText = "Bombs: " + dodgerBombs + " (Space)";
                }
                continue;
            }

            let dx = dodgerPlayer.x - a.x;
            let dy = dodgerPlayer.y - a.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < dodgerPlayer.radius + a.radius) {
                triggerGameOver(); // Launches interactive failure overlay screen
                return;
            }
        }

        animationFrameId = requestAnimationFrame(runDodgerLoop);
    }


    /* ========================================================================
       ENGINE MODEL #2: CYBER SNAKE (BIG MAP & CONTROLLED SPEED EDITION)
       ======================================================================== */
    let snake, snakeDirection, nextDirection, snakeFood, snakeScore, gridSize, tileCountX, tileCountY, snakeSpeedTimer;

    function initSnakeEngine() {
        snakeScore = 0;
        scoreText.innerText = snakeScore;
        highscoreText.innerText = highScores.snake;
        auxText.innerText = "Status: Grid Active";

        // REDUCED BLOCK SIZE FOR LARGER MAP MATRIX TILES COUNT
        gridSize = 15; 
        tileCountX = Math.floor(canvas.width / gridSize);
        tileCountY = Math.floor(canvas.height / gridSize);

        let startX = Math.floor(tileCountX / 2);
        let startY = Math.floor(tileCountY / 2);

        snake = [
            { x: startX, y: startY },
            { x: startX, y: startY + 1 },
            { x: startX, y: startY + 2 }
        ];

        snakeDirection = { x: 0, y: -1 }; 
        nextDirection = { x: 0, y: -1 };

        spawnSnakeFood();
        
        snakeSpeedTimer = 0;
        if (loopSpeedIntervalId) clearInterval(loopSpeedIntervalId);
        
        runSnakeLoop();
    }

    function spawnSnakeFood() {
        snakeFood = {
            x: Math.floor(Math.random() * tileCountX),
            y: Math.floor(Math.random() * tileCountY)
        };
        for (let cell of snake) {
            if (cell.x === snakeFood.x && cell.y === snakeFood.y) {
                spawnSnakeFood();
                break;
            }
        }
    }

    function runSnakeLoop() {
        if (currentActiveGame !== 'snake') return;

        // Precise input parsing tracking
        if ((keys['w'] || keys['arrowup']) && snakeDirection.y === 0) nextDirection = { x: 0, y: -1 };
        if ((keys['s'] || keys['arrowdown']) && snakeDirection.y === 0) nextDirection = { x: 0, y: 1 };
        if ((keys['a'] || keys['arrowleft']) && snakeDirection.x === 0) nextDirection = { x: -1, y: 0 };
        if ((keys['d'] || keys['arrowright']) && snakeDirection.x === 0) nextDirection = { x: 1, y: 0 };

        snakeSpeedTimer++;
        // INCREASED TICK COEFFICIENT DELAY (7 -> 11) TO CONTROL AND SLOW DOWN THE SPEED PERMANENTLY
        if (snakeSpeedTimer >= 11) { 
            snakeSpeedTimer = 0;

            snakeDirection = nextDirection;
            
            let head = { 
                x: snake[0].x + snakeDirection.x, 
                y: snake[0].y + snakeDirection.y 
            };

            // SOLID EDGE DETECTION: Touching border triggers Game Over instantly
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                triggerGameOver();
                return;
            }

            // Body crash check
            for (let cell of snake) {
                if (head.x === cell.x && head.y === cell.y) {
                    triggerGameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === snakeFood.x && head.y === snakeFood.y) {
                snakeScore += 10;
                scoreText.innerText = snakeScore;
                
                if(snakeScore > highScores.snake) {
                    highScores.snake = snakeScore;
                    highscoreText.innerText = highScores.snake;
                }
                spawnSnakeFood();
            } else {
                snake.pop();
            }
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Tech Grid Background guidelines
        ctx.strokeStyle = "rgba(255, 255, 255, 0.015)";
        ctx.lineWidth = 1;
        for (let i = 0; i < tileCountX; i++) {
            ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
        }
        for (let j = 0; j < tileCountY; j++) {
            ctx.beginPath(); ctx.moveTo(0, j * gridSize); ctx.lineTo(canvas.width, j * gridSize); ctx.stroke();
        }

        // Food core
        ctx.save();
        ctx.fillStyle = "#ff0055";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#ff0055";
        ctx.fillRect(snakeFood.x * gridSize + 2, snakeFood.y * gridSize + 2, gridSize - 4, gridSize - 4);
        ctx.restore();

        // Shifting snake tail rendering loops
        snake.forEach((cell, index) => {
            ctx.save();
            if (index === 0) {
                ctx.fillStyle = "#ff0080"; 
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ff0080";
            } else {
                ctx.fillStyle = "rgba(255, 0, 128, " + (1 - (index / snake.length) * 0.6) + ")";
            }
            ctx.fillRect(cell.x * gridSize + 1, cell.y * gridSize + 1, gridSize - 2, gridSize - 2);
            ctx.restore();
        });

        animationFrameId = requestAnimationFrame(runSnakeLoop);
    }
</script>
</body>
</html>
