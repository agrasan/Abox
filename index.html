<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids with Collectible Bombs</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b10;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            background: radial-gradient(circle, #111525 0%, #050508 100%);
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 15px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px #000;
        }

        .bombs-display {
            color: #ff3366;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.6);
        }

        /* Menu Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay h1 {
            font-size: 40px;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .overlay p {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 12px 30px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            pointer-events: auto;
        }

        button:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
        }

        .hidden {
            display: none !important;
        }

        /* On-screen Controls for layout accessibility */
        #controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .btn-ctrl {
            padding: 10px 20px;
            font-size: 14px;
            border-color: #555;
            color: #ccc;
        }
        
        .btn-bomb {
            border-color: #ff3366;
            color: #ff3366;
        }
        .btn-bomb:hover {
            background: #ff3366;
            color: #000;
            box-shadow: 0 0 15px #ff3366;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="550"></canvas>
        
        <div class="ui-layer">
            <div class="stats-bar">
                <div>SCORE: <span id="score-val">0</span></div>
                <div class="bombs-display">BOMBS: <span id="bomb-val">1</span></div>
                <div>LIVES: <span id="lives-val">3</span></div>
            </div>
        </div>

        <div id="start-overlay" class="overlay">
            <h1 style="color: #00ffcc;">ASTEROIDS</h1>
            <p>Collect glowing PINK BOMBS. Press 'B' to clear the map!</p>
            <button id="start-btn">START GAME</button>
        </div>

        <div id="pause-overlay" class="overlay hidden">
            <h1 style="color: #ffcc00;">GAME PAUSED</h1>
            <p>Press 'P' or click below to return to action</p>
            <button id="resume-btn">RESUME</button>
        </div>

        <div id="gameover-overlay" class="overlay hidden">
            <h1 style="color: #ff3333;">GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <div id="controls">
        <button class="btn-ctrl" id="ctrl-left">◀ Left</button>
        <button class="btn-ctrl" id="ctrl-thrust">Thrust ▲</button>
        <button class="btn-ctrl" id="ctrl-right">Right ▶</button>
        <button class="btn-ctrl" id="ctrl-shoot" style="border-color:#00ffcc; color:#00ffcc;">Shoot (Space)</button>
        <button class="btn-ctrl btn-bomb" id="ctrl-bomb">BOMB (B)</button>
        <button class="btn-ctrl" id="ctrl-pause" style="border-color:#ffcc00; color:#ffcc00;">Pause (P)</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI elements
        const scoreVal = document.getElementById('score-val');
        const bombVal = document.getElementById('bomb-val');
        const livesVal = document.getElementById('lives-val');
        const finalScore = document.getElementById('final-score');
        
        const startOverlay = document.getElementById('start-overlay');
        const pauseOverlay = document.getElementById('pause-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');

        // Game Configuration constants
        const FRICTION = 0.99;
        const SHIP_TURN_SPEED = 0.06;
        const SHIP_THRUST = 0.15;
        const LASER_SPEED = 7;
        const LASER_MAX_LIFE = 60; // frames

        // Game State Variables
        let score = 0;
        let lives = 3;
        let bombs = 1;
        let gameRunning = false;
        let isPaused = false;
        
        let ship;
        let lasers = [];
        let asteroids = [];
        let collectibleBombs = [];
        let shockwaves = [];
        let particles = [];
        
        let keys = {};
        let spawnTimer = 0;

        // --- Ship Setup ---
        function createShip() {
            return {
                x: canvas.width / 2,
                y: canvas.height / 2,
                r: 12,
                angle: -Math.PI / 2,
                velocity: { x: 0, y: 0 },
                thrusting: false,
                invulnerable: 120 // frames of spawn safety
            };
        }

        // --- Event Listeners ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'KeyP' || e.code === 'KeyB') {
                e.preventDefault(); // Stop page scrolling
            }
            keys[e.code] = true;

            // Instant triggers on key down
            if (gameRunning) {
                if (e.code === 'KeyP') togglePause();
                if (e.code === 'KeyB' && !isPaused) triggerSmartBomb();
                if (e.code === 'Space' && !isPaused) fireLaser();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // UI Buttons Mapping
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('resume-btn').addEventListener('click', togglePause);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        document.getElementById('ctrl-pause').addEventListener('click', () => { if(gameRunning) togglePause(); });
        document.getElementById('ctrl-bomb').addEventListener('click', () => { if(gameRunning && !isPaused) triggerSmartBomb(); });
        document.getElementById('ctrl-shoot').addEventListener('click', () => { if(gameRunning && !isPaused) fireLaser(); });

        // Touch/Click Hold Controls for Moving
        setupHoldButton('ctrl-left', 'KeyA');
        setupHoldButton('ctrl-right', 'KeyD');
        setupHoldButton('ctrl-thrust', 'KeyW');

        function setupHoldButton(elementId, simulatedKey) {
            const btn = document.getElementById(elementId);
            const startAction = (e) => { e.preventDefault(); keys[simulatedKey] = true; };
            const endAction = (e) => { e.preventDefault(); keys[simulatedKey] = false; };
            
            btn.addEventListener('mousedown', startAction);
            btn.addEventListener('mouseup', endAction);
            btn.addEventListener('touchstart', startAction);
            btn.addEventListener('touchend', endAction);
        }

        // --- Game Flow Control ---
        function startGame() {
            score = 0;
            lives = 3;
            bombs = 1;
            asteroids = [];
            lasers = [];
            collectibleBombs = [];
            shockwaves = [];
            particles = [];
            
            ship = createShip();
            
            // Spawn initial generation of large Asteroids
            for (let i = 0; i < 4; i++) {
                spawnAsteroid();
            }

            updateHUD();
            startOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
            pauseOverlay.classList.add('hidden');
            
            isPaused = false;
            gameRunning = true;
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseOverlay.classList.remove('hidden');
            } else {
                pauseOverlay.classList.add('hidden');
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScore.innerText = score;
            gameoverOverlay.classList.remove('hidden');
        }

        function updateHUD() {
            scoreVal.innerText = score;
            bombVal.innerText = bombs;
            livesVal.innerText = lives;
        }

        // --- Object Creators ---
        function spawnAsteroid(x, y, tier = 3) {
            // Tier 3 = Large, Tier 2 = Medium, Tier 1 = Small
            let astX = x !== undefined ? x : Math.random() * canvas.width;
            let astY = y !== undefined ? y : Math.random() * canvas.height;
            
            // Avoid spawning directly on top of center ship when starting
            if (x === undefined && ship) {
                let dist = Math.hypot(astX - ship.x, astY - ship.y);
                if (dist < 100) { astX += 150; astY += 150; }
            }

            const angles = Math.floor(Math.random() * 4) + 8; // Vertices shape
            const offsets = [];
            for (let i = 0; i < angles; i++) {
                offsets.push(Math.random() * 0.4 + 0.8);
            }

            asteroids.push({
                x: astX,
                y: astY,
                tier: tier,
                r: tier * 15,
                velocity: {
                    x: (Math.random() - 0.5) * (4 - tier + 1),
                    y: (Math.random() - 0.5) * (4 - tier + 1)
                },
                angle: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.02,
                offsets: offsets
            });
        }

        function spawnCollectibleBomb() {
            collectibleBombs.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                r: 10,
                pulse: 0,
                life: 600 // Disappears after 10 seconds if not grabbed
            });
        }

        function fireLaser() {
            lasers.push({
                x: ship.x + Math.cos(ship.angle) * ship.r,
                y: ship.y + Math.sin(ship.angle) * ship.r,
                vx: Math.cos(ship.angle) * LASER_SPEED + ship.velocity.x * 0.5,
                vy: Math.sin(ship.angle) * LASER_SPEED + ship.velocity.y * 0.5,
                life: 0
            });
        }

        function triggerSmartBomb() {
            if (bombs <= 0) return;
            bombs--;
            updateHUD();

            // Setup shockwave physics center frame
            shockwaves.push({
                x: ship.x,
                y: ship.y,
                r: 10,
                maxR: Math.hypot(canvas.width, canvas.height), 
                speed: 15
            });

            // Handle mass destruction mechanics
            asteroids.forEach(ast => {
                score += (4 - ast.tier) * 5; // Give partial score points
                createExplosion(ast.x, ast.y, '#ffffff', ast.r);
            });
            asteroids = []; // Clear current elements
        }

        function createExplosion(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 30 + Math.random() * 20,
                    color: color
                });
            }
        }

        // --- Core Physics Engine & Update Routines ---
        function update() {
            if (!gameRunning || isPaused) return;

            // 1. Ship Movement Logic
            if (keys['KeyW'] || keys['ArrowUp']) {
                ship.velocity.x += Math.cos(ship.angle) * SHIP_THRUST;
                ship.velocity.y += Math.sin(ship.angle) * SHIP_THRUST;
                ship.thrusting = true;
            } else {
                ship.thrusting = false;
            }

            if (keys['KeyA'] || keys['ArrowLeft']) ship.angle -= SHIP_TURN_SPEED;
            if (keys['KeyD'] || keys['ArrowRight']) ship.angle += SHIP_TURN_SPEED;

            ship.velocity.x *= FRICTION;
            ship.velocity.y *= FRICTION;
            ship.x += ship.velocity.x;
            ship.y += ship.velocity.y;

            // Wrap space coordinates borders
            if (ship.x < -ship.r) ship.x = canvas.width + ship.r;
            if (ship.x > canvas.width + ship.r) ship.x = -ship.r;
            if (ship.y < -ship.r) ship.y = canvas.height + ship.r;
            if (ship.y > canvas.height + ship.r) ship.y = -ship.r;

            if (ship.invulnerable > 0) ship.invulnerable--;

            // 2. Lasers Tracking
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.vx;
                l.y += l.vy;
                l.life++;

                // Wrap laser field boundary coordinates
                if (l.x < 0) l.x = canvas.width;
                if (l.x > canvas.width) l.x = 0;
                if (l.y < 0) l.y = canvas.height;
                if (l.y > canvas.height) l.y = 0;

                if (l.life > LASER_MAX_LIFE) {
                    lasers.splice(i, 1);
                }
            }

            // 3. Asteroids Tracking
            asteroids.forEach(ast => {
                ast.x += ast.velocity.x;
                ast.y += ast.velocity.y;
                ast.angle += ast.rotSpeed;

                if (ast.x < -ast.r) ast.x = canvas.width + ast.r;
                if (ast.x > canvas.width + ast.r) ast.x = -ast.r;
                if (ast.y < -ast.r) ast.y = canvas.height + ast.r;
                if (ast.y > canvas.height + ast.r) ast.y = -ast.r;
            });

            // 4. Collectible Items Handling
            for (let i = collectibleBombs.length - 1; i >= 0; i--) {
                let cb = collectibleBombs[i];
                cb.life--;
                cb.pulse += 0.1;

                // Check collision detection against Player
                let dist = Math.hypot(cb.x - ship.x, cb.y - ship.y);
                if (dist < cb.r + ship.r) {
                    bombs++;
                    createExplosion(cb.x, cb.y, '#ff3366', 15);
                    updateHUD();
                    collectibleBombs.splice(i, 1);
                    continue;
                }

                if (cb.life <= 0) collectibleBombs.splice(i, 1);
            }

            // 5. Shockwaves Processing
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.r += sw.speed;
                if (sw.r > sw.maxR) {
                    shockwaves.splice(i, 1);
                }
            }

            // 6. Impact Collisions Evaluation Engine
            // Lasers hitting Asteroids
            for (let a = asteroids.length - 1; a >= 0; a--) {
                for (let l = lasers.length - 1; l >= 0; l--) {
                    let dist = Math.hypot(asteroids[a].x - lasers[l].x, asteroids[a].y - lasers[l].y);
                    if (dist < asteroids[a].r) {
                        createExplosion(asteroids[a].x, asteroids[a].y, '#aaaaaa', asteroids[a].tier * 5);
                        breakAsteroid(a);
                        lasers.splice(l, 1);
                        break;
                    }
                }
            }

            // Asteroids hitting Ship
            if (ship.invulnerable <= 0) {
                for (let a = 0; a < asteroids.length; a++) {
                    let dist = Math.hypot(asteroids[a].x - ship.x, asteroids[a].y - ship.y);
                    if (dist < asteroids[a].r + ship.r) {
                        createExplosion(ship.x, ship.y, '#ff5500', 30);
                        lives--;
                        updateHUD();
                        if (lives <= 0) {
                            gameOver();
                        } else {
                            ship = createShip();
                        }
                        break;
                    }
                }
            }

            // 7. Background Particles Sparkle
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // 8. Systems Random Generators Spawning
            spawnTimer++;
            if (spawnTimer % 400 === 0) { // Spawn new standard outer asteroid
                spawnAsteroid();
            }
            if (spawnTimer % 700 === 0) { // Drop bomb unit chance item
                spawnCollectibleBomb();
            }
        }

        function breakAsteroid(index) {
            let ast = asteroids[index];
            score += (4 - ast.tier) * 10;
            updateHUD();

            if (ast.tier > 1) {
                // Split mechanics into 2 lower entities
                spawnAsteroid(ast.x, ast.y, ast.tier - 1);
                spawnAsteroid(ast.x, ast.y, ast.tier - 1);
            }
            asteroids.splice(index, 1);
        }

        // --- Canvas Rendering Pipeline Engine ---
        function draw() {
            // Clear Frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background Sparkle Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 50;
                ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.globalAlpha = 1.0; // Reset

            // Draw Collectible Item Units
            collectibleBombs.forEach(cb => {
                ctx.save();
                ctx.translate(cb.x, cb.y);
                
                // Outer glowing pulse ring
                let glowSize = cb.r + Math.sin(cb.pulse) * 4;
                ctx.strokeStyle = 'rgba(255, 51, 102, 0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
                ctx.stroke();

                // Core Unit Icon
                ctx.fillStyle = '#ff3366';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // Details
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-2, -2, 4, 4);
                ctx.restore();
            });

            // Draw Lasers
            ctx.fillStyle = '#00ffcc';
            lasers.forEach(l => {
                ctx.beginPath();
                ctx.arc(l.x, l.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Ship
            if (gameRunning) {
                ctx.save();
                ctx.translate(ship.x, ship.y);
                ctx.rotate(ship.angle);

                // Flickering safety shield look when invulnerable
                if (ship.invulnerable === 0 || Math.floor(ship.invulnerable / 4) % 2 === 0) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(ship.r, 0);
                    ctx.lineTo(-ship.r, -ship.r * 0.8);
                    ctx.lineTo(-ship.r * 0.5, 0);
                    ctx.lineTo(-ship.r, ship.r * 0.8);
                    ctx.closePath();
                    ctx.stroke();

                    // Thruster plume flame
                    if (ship.thrusting && Math.random() > 0.3) {
                        ctx.strokeStyle = '#ffcc00';
                        ctx.beginPath();
                        ctx.moveTo(-ship.r * 0.6, 0);
                        ctx.lineTo(-ship.r * 1.5, -ship.r * 0.3);
                        ctx.lineTo(-ship.r * 2, 0);
                        ctx.lineTo(-ship.r * 1.5, ship.r * 0.3);
                        ctx.closePath();
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }

            // Draw Asteroids Complex Polygons
            asteroids.forEach(ast => {
                ctx.save();
                ctx.translate(ast.x, ast.y);
                ctx.rotate(ast.angle);
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                for (let i = 0; i < ast.offsets.length; i++) {
                    let angle = (i / ast.offsets.length) * Math.PI * 2;
                    let r = ast.r * ast.offsets[i];
                    let currX = Math.cos(angle) * r;
                    let currY = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(currX, currY);
                    else ctx.lineTo(currX, currY);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            });

            // Draw Expanding Weapon Shockwaves Matrix
            shockwaves.forEach(sw => {
                ctx.strokeStyle = 'rgba(255, 51, 102, 0.6)';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        // --- Core Run-Loop Handle ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Initialize display components on script launch
        loop();
    </script>
</body>
</html>
