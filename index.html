<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asteroid Dodger</title>
    <style>
        body { margin: 0; background: #0b0b14; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #game-wrapper { position: relative; width: 95vw; height: 60vh; border: 2px solid #00ffcc; background: #05050a; margin-top: 10px; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        #controls-layer { width: 95vw; display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        #joystick-base { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid #00ffcc; border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #joystick-thumb { width: 30px; height: 30px; background: #00ffcc; border-radius: 50%; pointer-events: none; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 15px 25px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; touch-action: manipulation; }
        #pause-btn { background: #ffcc00; }
        #bomb-btn { background: #ff2e44; color: white; }
    </style>
</head>
<body>

<div id="game-wrapper"><canvas id="gameCanvas"></canvas></div>

<div id="controls-layer">
    <div id="joystick-base"><div id="joystick-thumb"></div></div>
    <div class="btn-group">
        <button id="pause-btn">⏸️</button>
        <button id="bomb-btn">💥 BOMB</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let player = { x: 100, y: 100, size: 25, vx: 0, vy: 0 };
    let asteroids = [];
    let isPaused = false;
    let lastBombTime = 0;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Joystick Logic: Controls Velocity
    const base = document.getElementById('joystick-base');
    const thumb = document.getElementById('joystick-thumb');
    
    base.addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let rect = base.getBoundingClientRect();
        let centerX = rect.left + 40;
        let centerY = rect.top + 40;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        
        // Limit thumb visual
        let dist = Math.sqrt(dx*dx + dy*dy);
        let angle = Math.atan2(dy, dx);
        let constrainedDist = Math.min(dist, 25);
        
        thumb.style.transform = `translate(${Math.cos(angle)*constrainedDist}px, ${Math.sin(angle)*constrainedDist}px)`;
        
        // Update velocity
        player.vx = (dx / 25) * 6;
        player.vy = (dy / 25) * 6;
    });

    base.addEventListener('touchend', () => {
        thumb.style.transform = `translate(0,0)`;
        player.vx = 0; player.vy = 0;
    });

    document.getElementById('bomb-btn').onclick = () => {
        if (Date.now() - lastBombTime > 2000) {
            asteroids = [];
            lastBombTime = Date.now();
        }
    };

    document.getElementById('pause-btn').onclick = () => isPaused = !isPaused;

    function loop() {
        if (!isPaused) {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // Move and Clamp Player
            player.x += player.vx;
            player.y += player.vy;
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
            
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            if(Math.random() < 0.05) asteroids.push({x: Math.random()*(canvas.width-20), y: -20});
            ctx.fillStyle = '#ff2e44';
            
            for(let i = asteroids.length - 1; i >= 0; i--) {
                let a = asteroids[i];
                a.y += 4;
                ctx.fillRect(a.x, a.y, 20, 20);
                
                // Collision
                if (a.x < player.x + player.size && a.x + 20 > player.x &&
                    a.y < player.y + player.size && a.y + 20 > player.y) {
                    player.x = 100; player.y = 100; // Reset
                    asteroids = [];
                }
                
                if(a.y > canvas.height) asteroids.splice(i, 1);
            }
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
