<!DOCTYPE html>
<html lang="en">
<head>
<meta name="description" content="Play the ultimate Abox web games portal by Agrasan. High energy browser games.">
<meta name="keywords" content="Abox, Abox Portal, Abox Game, Agrasan, Agrasan Games, HTML Games">
<meta name="author" content="Agrasan">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abox Portal | Agrasan Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0d0d11;
            color: #ffffff;
            padding: 20px;
            overflow-x: hidden;
        }

        .portal-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            text-align: center;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00ffcc, #33ccff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            margin-bottom: 15px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #0d0d11;
        }

        .portal-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 3px;
        }

        .portal-header h1 span {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        .portal-header p {
            color: #666677;
            margin-top: 5px;
            font-size: 1rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: linear-gradient(135deg, #151522, #07070f);
            border: 3px solid #252530;
            border-radius: 16px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
        }

        .game-card .tile-logo {
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .game-card:hover {
            transform: scale(1.08);
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        .game-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 13, 17, 0.95);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            padding: 8px 5px;
            border-top: 1px solid #252530;
        }

        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 8, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .modal-content {
            position: relative;
            background: #0b0b16;
            border: 4px solid #00ffcc;
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 460px;
        }

        .modal-content:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            border: none;
            border-radius: 0;
            padding: 15px;
            justify-content: center;
        }

        .controls-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .modal-content:fullscreen .controls-container {
            position: absolute;
            top: 15px;
            padding: 0 20px;
        }

        .btn {
            background: #1e1e24;
            border: 2px solid #00ffcc;
            color: #fff;
            padding: 8px 14px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00ffcc;
            color: #000;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 400px;
        }

        .modal-content:fullscreen #canvas-wrapper {
            width: 95vw;
            height: 70vh;
            max-width: none;
            margin-top: 30px;
        }

        #gameCanvas {
            border: 2px solid #00ffcc;
            background-color: #020208;
            width: 100%;
            height: 100%;
            display: block;
        }

        .hide-cursor {
            cursor: none !important;
        }

        #scoreBoard {
            font-size: 16px;
            margin-top: 15px;
            font-weight: bold;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 100%;
            text-align: center;
        }

        .modal-content:fullscreen #scoreBoard {
            position: absolute;
            bottom: 15px;
            font-size: 22px;
            max-width: 700px;
        }

        .shield-timer { color: #33ccff; }
        .bomb-counter { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="portal-header">
        <div class="brand-logo">A</div>
        <h1>A<span>BOX</span></h1>
        <p>Handcrafted Classic Custom HTML5 Experiences</p>
    </div>

    <main class="game-grid">
        <div class="game-card" id="launcherTile">
            <div class="tile-logo">🚀</div>
            <div class="game-title">Asteroid Dodger</div>
        </div>

        <div class="game-card" style="opacity: 0.15; cursor: not-allowed;"><div class="tile-logo" style="filter:grayscale(1)">👾</div><div class="game-title">Coming Soon</div></div>
        <div class="game-card" style="opacity: 0.15; cursor: not-allowed;"><div class="tile-logo" style="filter:grayscale(1)">🧱</div><div class="game-title">Coming Soon</div></div>
    </main>

    <div id="gameModal" class="modal">
        <div class="modal-content" id="modalContent">
            <div class="controls-container">
                <button class="btn" onclick="toggleFullScreen()">Fullscreen</button>
                <h2 style="color: #00ffcc; font-size: 1.2rem; letter-spacing: 1px;">ASTEROID DODGER</h2>
                <button class="btn" style="border-color: #ff0055;" onclick="closeGame()">Close</button>
            </div>
            
            <div id="canvas-wrapper">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>

            <div id="scoreBoard">
                <div>Score: <span id="score">0</span></div>
                <div class="shield-timer" id="shieldTimer">Shield: None</div>
                <div class="bomb-counter">Bombs: <span id="bombsCount">0</span> (R)</div>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            let now = audioCtx.currentTime;

            if (type === 'score') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.06, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } 
            else if (type === 'shieldGet' || type === 'bombGet') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(900, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } 
            else if (type === 'shieldBreak') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } 
            else if (type === 'blast') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
            else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.6);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        // --- CORE MODAL CONFIGS ---
        const modal = document.getElementById('gameModal');
        const modalContent = document.getElementById('modalContent');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const shieldDisplay = document.getElementById('shieldTimer');
        const bombsDisplay = document.getElementById('bombsCount');
        const launcherTile = document.getElementById('launcherTile');

        let gameActive = false;
        let cursorHiddenState = false;

        launcherTile.addEventListener('click', () => {
            initAudio(); 
            modal.style.display = 'flex';
            gameActive = true;
            cursorHiddenState = false;
            canvas.classList.remove('hide-cursor');
            resizeCanvas();
            resetGame(); 
        });

        function closeGame() {
            if (document.fullscreenElement) document.exitFullscreen();
            modal.style.display = 'none';
            gameActive = false;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                modalContent.requestFullscreen().then(() => {
                    setTimeout(resizeCanvas, 150);
                }).catch(err => {
                    alert(`Fullscreen Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            if (gameActive && player) {
                player.x = canvas.width / 2;
                player.y = canvas.height - 40;
            }
        }

        document.addEventListener('fullscreenchange', () => { setTimeout(resizeCanvas, 150); });
        window.addEventListener('resize', () => { if (gameActive) setTimeout(resizeCanvas, 150); });

        // --- GAME LOGIC ENGINE ---
        let score, gameOver, isPaused, player, enemies, spawnRate, frameCount;
        let shields, hasShield, shieldTimeLeft, shieldTimerInterval;
        let bombsInventory, bombsDrop, activeBlastRadius, blastMaxSize, isBlasting;
        let starfield = [];

        function initStars() {
            starfield = [];
            for(let i = 0; i < 40; i++) {
                starfield.push({
                    x: Math.random() * 600,
                    y: Math.random() * 600,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 1.5 + 0.5
                });
            }
        }

        function resetGame() {
            score = 0;
            gameOver = false;
            isPaused = false;
            spawnRate = 20;
            frameCount = 0;
            enemies = [];
            shields = [];
            bombsDrop = [];
            bombsInventory = 0;
            
            activeBlastRadius = 0;
            blastMaxSize = 220; 
            isBlasting = false;

            hasShield = false;
            shieldTimeLeft = 0;
            clearInterval(shieldTimerInterval);
            initStars();
            
            player = {
                x: canvas.width / 2,
                y: canvas.height - 40,
                size: 16,
                color: '#00ffcc'
            };
            
            scoreDisplay.innerText = score;
            bombsDisplay.innerText = bombsInventory;
            shieldDisplay.innerText = "Shield: None";
            shieldDisplay.style.color = "#aaa";
            gameLoop();
        }

        function triggerBombBlast() {
            if (bombsInventory > 0 && !isBlasting && !gameOver && !isPaused) {
                bombsInventory--;
                bombsDisplay.innerText = bombsInventory;
                isBlasting = true;
                activeBlastRadius = 10;
                playSound('blast');
            }
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            if (e.code === 'Space' && !gameOver) {
                e.preventDefault();
                isPaused = !isPaused;
                if (!isPaused) gameLoop(); 
            }

            if (e.code === 'Enter' && gameOver) {
                resetGame();
            }

            if (e.key.toLowerCase() === 't') {
                cursorHiddenState = !cursorHiddenState;
                if (cursorHiddenState) {
                    canvas.classList.add('hide-cursor');
                } else {
                    canvas.classList.remove('hide-cursor');
                }
            }

            if (e.key.toLowerCase() === 'r') {
                triggerBombBlast();
            }
        });

        canvas.addEventListener('mousemove', (event) => {
            if (!gameActive || gameOver || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            player.x = event.clientX - rect.left;
            player.y = event.clientY - rect.top;
        });

        function handleTouch(event) {
            if (!gameActive || gameOver || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const touch = event.touches[0];
            player.x = touch.clientX - rect.left;
            player.y = touch.clientY - rect.top;
        }
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleTouch(e); }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            if(e.touches.length > 0 || player.y < 80) {
                triggerBombBlast();
            }
        });

        function spawnEnemy() {
            const size = Math.random() * 15 + 10;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: Math.random() * 3 + 2,
                color: '#ff3366'
            });
        }

        function spawnShield() {
            shields.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                size: 14,
                speed: 2,
                color: '#33ccff'
            });
        }

        function spawnBombItem() {
            bombsDrop.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                size: 13,
                speed: 2.2,
                color: '#ffcc00'
            });
        }

        function activateShield() {
            playSound('shieldGet');
            hasShield = true;
            shieldTimeLeft = 30;
            shieldDisplay.style.color = "#33ccff";
            shieldDisplay.innerText = `Shield: ${shieldTimeLeft}s`;

            clearInterval(shieldTimerInterval);
            shieldTimerInterval = setInterval(() => {
                if (gameOver || !gameActive || isPaused) return; 
                shieldTimeLeft--;
                if (shieldTimeLeft <= 0) {
                    deactivateShield();
                } else {
                    shieldDisplay.innerText = `Shield: ${shieldTimeLeft}s`;
                }
            }, 1000);
        }

        function deactivateShield() {
            hasShield = false;
            clearInterval(shieldTimerInterval);
            shieldDisplay.innerText = "Shield: None";
            shieldDisplay.style.color = "#aaa";
        }

        function gameLoop() {
            if (!gameActive || isPaused) {
                if (isPaused && gameActive) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ffcc';
                    ctx.font = 'bold 32px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                }
                return;
            }

            if (gameOver) {
                clearInterval(shieldTimerInterval);
                playSound('gameover');
                ctx.fillStyle = 'rgba(5, 5, 10, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ff3366';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText('Press ENTER or Tap Button to Play Again', canvas.width / 2, canvas.height / 2 + 10);

                const btnW = 180, btnH = 45;
                const btnX = (canvas.width / 2) - (btnW / 2), btnY = (canvas.height / 2) + 45;
                ctx.fillStyle = '#00ffcc';
                ctx.fillRect(btnX, btnY, btnW, btnH);

                ctx.fillStyle = '#000000';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('RESTART', canvas.width / 2, btnY + (btnH / 2));
                
                const clickRestart = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    let inputX = (e.clientX || (e.changedTouches && e.changedTouches[0].clientX)) - rect.left;
                    let inputY = (e.clientY || (e.changedTouches && e.changedTouches[0].clientY)) - rect.top;
                    
                    if (inputX >= btnX && inputX <= btnX + btnW && inputY >= btnY && inputY <= btnY + btnH && gameOver) {
                        canvas.removeEventListener('click', clickRestart);
                        canvas.removeEventListener('touchend', clickRestart);
                        resetGame();
                    }
                };
                canvas.addEventListener('click', clickRestart);
                canvas.addEventListener('touchend', clickRestart);
                return;
            }

            ctx.fillStyle = '#03030d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ffffff";
            for(let s of starfield) {
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
                ctx.fillRect(s.x % canvas.width, s.y, s.size, s.size);
            }

            frameCount++;
            if (frameCount % spawnRate === 0) spawnEnemy();
            if (frameCount % 800 === 0) spawnShield();
            if (frameCount % 600 === 0) spawnBombItem();

            if (isBlasting) {
                activeBlastRadius += 6; 
                ctx.strokeStyle = 'rgba(51, 204, 255, ' + (1 - activeBlastRadius/blastMaxSize) + ')';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(player.x, player.y, activeBlastRadius, 0, Math.PI * 2);
                ctx.stroke();

                if (activeBlastRadius >= blastMaxSize) {
                    isBlasting = false;
                    activeBlastRadius = 0;
                }
            }

            if (hasShield) {
                ctx.strokeStyle = '#33ccff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.size + 15, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size - 4); 
            ctx.lineTo(player.x - player.size, player.y + player.size); 
            ctx.lineTo(player.x, player.y + (player.size / 2)); 
            ctx.lineTo(player.x + player.size, player.y + player.size); 
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(player.x - 4, player.y + (player.size / 2) + 2);
            ctx.lineTo(player.x, player.y + player.size + (Math.random() * 8));
            ctx.lineTo(player.x + 4, player.y + (player.size / 2) + 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            for (let j = shields.length - 1; j >= 0; j--) {
                let s = shields[j];
                s.y += s.speed;

                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('S', s.x, s.y);

                let sDistX = player.x - s.x;
                let sDistY = player.y - s.y;
                let sDistance = Math.sqrt(sDistX * sDistX + sDistY * sDistY);

                if (sDistance < player.size + s.size) {
                    shields.splice(j, 1);
                    activateShield();
                    continue;
                }
                if (s.y > canvas.height + s.size) shields.splice(j, 1);
            }

            for (let b = bombsDrop.length - 1; b >= 0; b--) {
                let bombItem = bombsDrop[b];
                bombItem.y += bombItem.speed;

                ctx.fillStyle = (frameCount % 10 < 5) ? '#ffcc00' : '#ffa500';
                ctx.beginPath();
                ctx.arc(bombItem.x, bombItem.y, bombItem.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('B', bombItem.x, bombItem.y);

                let bDistX = player.x - bombItem.x;
                let bDistY = player.y - bombItem.y;
                let bDistance = Math.sqrt(bDistX * bDistX + bDistY * bDistY);

                if (bDistance < player.size + bombItem.size) {
                    bombsDrop.splice(b, 1);
                    bombsInventory++;
                    playSound('bombGet');
                    bombsDisplay.innerText = bombsInventory;
                    continue;
                }
                if (bombItem.y > canvas.height + bombItem.size) bombsDrop.splice(b, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;

                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();

                let distX = player.x - e.x;
                let distY = player.y - e.y;
                let distance = Math.sqrt(distX * distX + distY * distY);

                if (isBlasting && distance <= activeBlastRadius + e.size) {
                    enemies.splice(i, 1);
                    score += 2; 
                    scoreDisplay.innerText = score;
                    continue;
                }

                if (distance < player.size + e.size) {
                    if (hasShield) {
                        playSound('shieldBreak');
                        enemies.splice(i, 1);
                        deactivateShield();
                        continue;
                    } else {
                        gameOver = true;
                    }
                }

                if (e.y > canvas.height + e.size) {
                    enemies.splice(i, 1);
                    score++;
                    playSound('score');
                    scoreDisplay.innerText = score;
                    if (score % 10 === 0 && spawnRate > 6) {
                        spawnRate--;
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
