<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASTEROID DODGER | Abox Portal</title>
    <style>
        body { margin: 0; background: #0b0b14; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #game-wrapper { position: relative; width: 95vw; height: 65vh; border: 2px solid #00ffcc; background: #05050a; margin-top: 10px; }
        canvas { display: block; width: 100%; height: 100%; }
        #controls-layer { width: 95vw; display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        #joystick-base { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid #00ffcc; border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #joystick-thumb { width: 40px; height: 40px; background: #00ffcc; border-radius: 50%; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 15px 20px; font-weight: bold; border-radius: 10px; border: none; }
        #pause-btn { background: #ffcc00; }
        #bomb-btn { background: #ff2e44; color: white; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="controls-layer">
    <div id="joystick-base"><div id="joystick-thumb"></div></div>
    <div class="btn-group">
        <button id="pause-btn">⏸️</button>
        <button id="bomb-btn">💥 BOMB</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;

    let player = { x: 200, y: 300, vx: 0, vy: 0 };
    let asteroids = [];
    let isPaused = false;

    // Joystick Logic
    const base = document.getElementById('joystick-base');
    const thumb = document.getElementById('joystick-thumb');
    base.addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let rect = base.getBoundingClientRect();
        let dx = touch.clientX - (rect.left + 50);
        let dy = touch.clientY - (rect.top + 50);
        thumb.style.transform = `translate(${dx}px, ${dy}px)`;
        player.vx = dx / 10; player.vy = dy / 10;
    });
    base.addEventListener('touchend', () => {
        thumb.style.transform = `translate(0,0)`;
        player.vx = 0; player.vy = 0;
    });

    // Buttons
    document.getElementById('pause-btn').onclick = () => isPaused = !isPaused;
    document.getElementById('bomb-btn').onclick = () => asteroids = [];

    // Simple Render Loop
    function loop() {
        if (!isPaused) {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            player.x += player.vx; player.y += player.vy;
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x, player.y, 30, 30);
            
            if(Math.random() < 0.05) asteroids.push({x: Math.random()*canvas.width, y: 0});
            ctx.fillStyle = '#ff2e44';
            asteroids.forEach(a => { a.y += 5; ctx.fillRect(a.x, a.y, 20, 20); });
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
